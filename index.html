<!DOCTYPE html>
<html>
<head>
    <title>Pipponich | DJ</title>
    <meta charset="UTF-8">

    <!-- Fuente moderna -->
   <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            color: white;

            /* fondo tipo club */
            background-image: url("https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* capa oscura encima del fondo */
        .overlay {
            background: rgba(0,0,0,0.75);
            min-height: 100vh;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        h2 {
            font-weight: 300;
            color: #cccccc;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(20,20,20,0.9);
            padding: 30px;
            margin: 25px auto;
            max-width: 450px;
            border-radius: 16px;
            backdrop-filter: blur(6px);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            background: #00ffcc;
            color: black;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .tagline {
            font-style: italic;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="overlay">

        <h1>PIPPONICH</h1>
        <h2>DJ • Reggaetón • R&B • Dancehall</h2>

        <div class="card tagline">
            Creando la previa perfecta. Energía arriba desde el primer track.
        </div>

        <div class="card">
            <h3>Próximas fechas</h3>
            <ul>
                <li>Viernes – Berlín Bar</li>
                <li>Sábado – Private Party</li>
            </ul>
        </div>

        <div class="card">
            <h3>Contrataciones</h3>
            <a class="btn" href="https://wa.me/5491134430666">
                Escribime por WhatsApp
            </a>
	
        </div>
	
	  <div class="card">
	 <a class="btn" href="https://www.instagram.com/pipponich/">
                Instagram
            </a>
	</div>



    </div>

</body>
</html>
